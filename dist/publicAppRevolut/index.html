<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="bundle.js"></script>
    <title>Revolut Home Task</title>
  </head>
  <body>
    <b> Create order: </b><br>
    <label for="order-price">Order price (GBP):</label><br>
    <input type="number" step="0.01" placeholder="1.00" id="order-price" name="order-price"><br>
    <button id="button-create-order" type="button">Create New Order</button>
    <br>
    <br>
    <div id="order-info"> </div>
    <br>
    <b>Please fill in your card details:</b>
    <div id="cart-field"></div>
    <button id="button-pay" type="button">Pay</button><br>
    <br>
    <div id="payment-status"></div>

  </body>
</html>
